<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – e-Health Connect</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand h1 {
            color: #1b2a4e;
            font-size: 25px;
            font-weight: 700;
        }

        .brand p {
            color: #64748b;
            font-size: 19px;
            margin-top: 4px;
            
        }

        .admin-badge {
            display: inline-block;
            background: #1b2a4e;
            color: white;
            font-size: 15px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            color: #1e293b;
            transition: border-color 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #1b2a4e;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: #1b2a4e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover { background: #243761; }

        .login-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 15px;
            color: #94a3b8;
        }
        .success-msg {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand">
        <h1>e-Health Connect Hub</h1>
        <p>Secure Administrator Access</p>
        <span class="admin-badge">Admin Portal</span>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="input-group">
        <label for="email">Admin Email</label>
        <input
            type="email"
            id="email"
            placeholder="admin@ehealthconnect.co.za"
            autocomplete="off"
            required>
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input
            type="password"
            id="password"
            placeholder="••••••••"
            autocomplete="off"
            required>
    </div>

    <button class="login-btn" id="loginBtn" onclick="adminLogin()">Login</button>
    <div class="footer-note">
        <a href="reseting.html" style="color:var(--accent);">Forgot Password?</a>
    </div>

    <div class="footer-note">
        This portal is restricted to authorized administrators only.
    </div>
</div>

<script>
    const supabaseUrl = "https://gqyhkccupbeudenvsdsf.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxeWhrY2N1cGJldWRlbnZzZHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDgyMjgsImV4cCI6MjA5MTA4NDIyOH0.C6dtGH1277KKiMBpXtWSxRY9JQrfbbo7eYKIgomoap8";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
    }

    function hideError() {
        document.getElementById("errorMsg").style.display = "none";
    }

    async function adminLogin() {
        hideError();

        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn      = document.getElementById("loginBtn");

        if (!email || !password) {
            showError("Please fill in all fields.");
            return;
        }

        btn.disabled    = true;
        btn.textContent = "Verifying...";

        try {

            await client.auth.signOut();

            const { data: authData, error: authError } = await client.auth.signInWithPassword({
                email,
                password
            });

            if (authError) {
                showError("Incorrect email or password.");
                return;
            }

            
            const { data: adminRecord, error: adminError } = await client
                .from("admins")
                .select("id, name, role")
                .eq("id", authData.user.id)
                .single();

            if (adminError || !adminRecord) {
                await client.auth.signOut();
                showError("Access denied. This account is not an administrator.");
                return;
            }

            document.getElementById("successMsg").textContent = "Admin authenticated! Redirecting...";
            document.getElementById("successMsg").style.display = "block";
            setTimeout(() => {
                window.location.href = "adminDashboard.html";
            }, 1500);
        } catch (err) {
            console.error(err);
            showError("Something went wrong. Please try again.");
        } finally {
            btn.disabled    = false;
            btn.textContent = "Login";
        }
    }

    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") adminLogin();
    });
</script>

</body>
</html>
