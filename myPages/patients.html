
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient registration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="Style.css">


</head>
<body style="background: rgb(0, 204, 255);">
    
    <div class="container">
        <div class="title">Patient Registration</div>
            <form action="">
                <div class="user-details">

                    <div class="input-box">
                        <span class="details">First name</span>
                        <input type="text" id="name" placeholder="i.e John" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Surname</span>
                        <input type="text" id="surname" placeholder="i.e Doe" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Date of Birth</span>
                        <input type="date" id="date_of_birth" placeholder="i.e 01/01/2020">
                    </div>

                    <div class="input-box">
                        <span class="details">ID number</span>
                        <input type="text" id="id_number" placeholder="i.e 0000000000000" required maxlength="13">
                    </div>

                    <div class="input-box">
                        <span class="details">Title</span>
                        <input type="text" id="title" placeholder="i.e Mr. / Ms / Miss/ Mrs" required maxlength="4">
                    </div>

                    <div class="input-box">
                        <span class="details">Phone number</span>
                        <input type="text" id="phone" placeholder="Cell phone Number" required maxlength="10">
                    </div>

                    <div class="input-box">
                        <span class="details">Prefered Languege</span>
                        <input type="text" id="languege" placeholder="i.e English / Siswati / isiZulu /etc" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Email Address</span>
                        <input type="email" id="email" placeholder="Email Address" required minlength="5">
                    </div>

                    <div class="input-box">
                        <span class="details" >Address</span>
                        <input type="text" id="address1" placeholder="Address Line 1" required >
                        <input type="text" id="address2" placeholder="Address Line 2" required>
                        <input type="text" id="address3" placeholder="Address Line 3" >
                        <input type="text" id="postalCode" placeholder="Postal Code" required>
                    </div>
                    <div class="input-box">
                        <span class="details">Province</span>
                        <input type="text" id="province" placeholder="i.e Mpumalanga" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Password</span>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Confirm Password</span>
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required >
                    </div>

                </div>

                <div class="gender-details">
                    <input type="radio" name="gender" id="dot-1" value="Male">
                    <input type="radio" name="gender" id="dot-2" value="Female">
                    <input type="radio" name="gender" id="dot-3" value="Prefer not to say">
                    <span class="gender-title">Gender</span>
                    <div class="category">
                        <label for="dot-1">
                            <span class="dot one"></span>
                            <span class="gender">Male</span>
                        </label>

                        <label for="dot-2">
                            <span class="dot two"></span>
                            <span class="gender">Female</span>
                        </label>

                        <label for="dot-3">
                            <span class="dot three"></span>
                            <span class="gender">Prefer not to say</span>
                        </label>

                    </div>

                </div>
                <div class="button">
                    <input type="submit" value="Register" onclick="patientsRegistration()">
                </div>
            </form>
        </div>    

    </div>
    <script src="index.js"></script>
</body>
</html>
