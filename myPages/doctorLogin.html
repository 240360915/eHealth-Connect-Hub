<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor</title>
    <link rel="stylesheet" href="Style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
      <header>

        <div class="logo-image">
          <img src="logo.jpeg" alt="This is the logo">
        </div>
        
        <h1>Welcome to e-Health Connect Hub</h1>

        <nav class="nav-bar">
          <a class="a" href="home.html" target="_blank">Home</a> |
          <a class="a" href="patientsLogin.html" target="_blank">Login</a> |
          <a class="a" href="Choose.html" target="_blank">Register</a> |
          <a class="a" href="doctorLogin.html" target="_blank">Find Doctor</a> |
          <a class="a" href="about.html" target="_blank">About</a>
        
        </nav>
    </header>
   <form class="PatientForm">
        <div class="heading">Get Connected in Seconds.</div>
        <div class="choosing">Please log to your account</div>
        <div class="role-buttons">
            <a href="patientsLogin.html" class="btn">Patient</a>
            <a href="doctorLogin.html" class="btn">Doctor</a>
            <a href="admin.html" class="btn">Administrator</a>
        </div>

        <div class="login-info">

            <div class="input-group">
                <input type="text" id="practice_number"  required minlength="7" autocomplete="new-password">
                <label for="practice_number">Practice number</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" required minlength="6" autocomplete="new-password">
                <label for="password">Password</label>
            </div>

        </div>  
        <div class="forgot">
            <a href="reseting.html">Forgot password?</a>
        </div>
        <button type="submit" class="login-btn" onclick="doctorLogin()">Login</button>         
    </form> 
    <script src="index.js"></script>
</body>
</html>
