<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=o, initial-scale=1.0">
    <title>Administrator</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
      <header>

        <div class="logo-image">
          <img src="logo.jpeg" alt="This is the logo">
        </div>
        
        <h1>Welcome to e-Health Connect Hub</h1>

        <nav class="nav-bar">
          <a class="a" href="home.html">Home</a> |
          <a class="a" href="patientsLogin.html">Login</a> |
          <a class="a" href="Choose.html">Register</a> |

        </nav>
      </header>    
    <form action="" class="PatientForm">
        <div class="heading">Welcome to Administrator panel.</div>
        <div class="role-buttons">
            <a href="patientsLogin.html" class="btn">Patient</a>
            <a href="doctorLogin.html" class="btn">Doctor</a>
            <a href="admin.html" class="btn">Administrator</a>
        </div>

        <div class="login-info">

            <div class="input-group">
                <input type="text" id="email" required minlength="5" autocomplete="new-password">
                <label for="email">Phone number or Email</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" required minlength="6" autocomplete="new-password">
                <label for="password">Password</label>
            </div>

        </div>  
        <div class="forgot">
            <a href="reseting.html">Forgot password?</a>
        </div>
                <button type="submit" class="login-btn">Login</button>         
    </form>
