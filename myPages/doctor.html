
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: "Roboto", sans-serif; 
        }
        body{

        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        background: rgb(0, 204, 255);
        padding: 20px;
        }
        
        .container{
            max-width: 700px;
            width: 100%;
            background-color: white;
            padding: 25px 30px;
            border-radius: 10px;
        }
        .container .title{
            font-size: 30px;
            font-weight: 500;
            position: relative;
        }
        .container .title::before{
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            height: 3px;
            width: 30px;
            background: #9b59b6;
        }
        .container form .user-details{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin: 20px 0 12px 0;
        }
        form .input-box{
            margin-bottom: 15px;
            width: calc(100% / 2 - 20px);
            
        }
        .input-box .details{
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            
            
        }
        form .user-details .input-box input{
            height: 45px;
            width: 100%;
            outline: none;
            border-radius: 5px;
            border: 1px solid #ccc;
            padding-left: 15px;
            font-size: 16px;
            border-bottom-width: 3px;
            transition:  all 0.3s ease;
        }
        form .user-details .input-box input:focus,
        form .user-details .input-box input:valid{
            border-color: blue;
        }
        .gender-details .gender-title{
            font-size: 20px;
            font-weight: 500;
        }
        .category{
        display: flex;

        width: 80%;
        margin: 14px 0;
        justify-content: space-between;
            
        }
        .gender-details .category label{
            display: flex;
            align-items: center;
        }
        .gender{
            font-size: 20px;
        }
        .dot{
            height: 18px;
            width: 18px;
            background: #d9d9d9;
            border-radius: 50%;
            margin-right: 10px;
            border: 5px solid transparent;
            transition: all 0.3s ease;
        }
        #dot-1:checked ~ .category label .one,
        #dot-2:checked ~ .category label .two,
        #dot-3:checked ~ .category label .three{
            border-color: #d9d9d9;
            background: #9b59b6;
        }
        input[type="radio"]{
            display: none;
        }
        .button{
            height: 45px;
            margin: 45px 0;

        }
        form .button input{
            height: 100%;
            width: 100%;
            outline: none;
            color: #fff;
            background: rgb(0, 204, 255);
            border: none;
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: 500;
            border-radius: 5px;
        }
        form .button input:hover{
            background:linear-gradient(-180deg,rgb(83, 83, 241),rgba(230, 222, 222, 0.993));
        }
        @media(max-width:584px){
            .container{
                max-width: 100%;
            }
            form .input-box{
            margin-bottom: 15px;
            width: 100%;
            }
            .category{
            
            width: 100%;
            }
            .container form .user-details{
                max-height: 300px;
                overflow-y:scroll ;
            }
            .user-details::-webkit-scrollbar{
                width: 0;
            }
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="title">Doctor Registration</div>
            <form action="">
                <div class="user-details">

                    <div class="input-box">
                        <span class="details">Practice Number</span>
                        <input type="text" id="practice_number" placeholder="Practice Number" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Practice Name</span>
                        <input type="text" id="practice_name" placeholder="Practice Name" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Discipline</span>
                        <input type="text" id="discipline" placeholder="Enter Discipline">
                    </div>

                    <div class="input-box">
                        <span class="details">Name</span>
                        <input type="text" id="name" placeholder="Names" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Surname</span>
                        <input type="text" id="surname" placeholder="Surname" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Cell phone Number</span>
                        <input type="text" id="phone" placeholder="Cell phone Number" required maxlength="10">
                    </div>

                    <div class="input-box">
                        <span class="details">ID Number</span>
                        <input type="text" id="idNumber" placeholder="Identity Number" required maxlength="13">
                    </div>

                    <div class="input-box">
                        <span class="details">Operating Hours</span>
                        <input type="text" placeholder="Operating Hours" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Qualifications</span>
                        <input type="text" placeholder="Qualifications" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Email Address</span>
                        <input type="email" id="email" placeholder="Email Address" required minlength="5">
                    </div>

                    <div class="input-box">
                        <span class="details">Profile Image</span>
                        <input type="file"  required>
                    </div>

                    <div class="input-box">
                        <span class="details">Address</span>
                        <input type="text" placeholder="Address Line 1" required >
                        <input type="text" placeholder="Address Line 2" required>
                        <input type="text" placeholder="Address Line 3" >
                        <input type="text" placeholder="Postal Code" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Password</span>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>

                    <div class="input-box">
                        <span class="details">Confirm Password</span>
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required >
                    </div>

                </div>

                <div class="gender-details">
                    <input type="radio" name="gender" id="dot-1">
                    <input type="radio" name="gender" id="dot-2">
                    <input type="radio" name="gender" id="dot-3">
                    <span class="gender-title">Gender</span>
                    <div class="category">
                        <label for="dot-1">
                            <span class="dot one"></span>
                            <span class="gender">Male</span>
                        </label>

                        <label for="dot-2">
                            <span class="dot two"></span>
                            <span class="gender">Female</span>
                        </label>

                        <label for="dot-3">
                            <span class="dot three"></span>
                            <span class="gender">Prefer not to say</span>
                        </label>

                    </div>

                </div>
                <div class="button">
                    <input type="submit" value="Register" onclick="doctorRegistration()">
                </div>
            </form>

    </div>
    <script src="index.js"></script>
</body>
</html>
